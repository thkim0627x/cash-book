spring:
  datasource:
    url: ${SPRING_DATASOURCE_URL}
    username: ${SPRING_DATASOURCE_USERNAME}
    password: ${SPRING_DATASOURCE_PASSWORD}
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 5
      minimum-idle: 2
      connection-timeout: 30000
      idle-timeout: 600000
      max-lifetime: 1800000
  batch:
    job:
      enabled: false
    jdbc:
      initialize-schema: always # 최초 부팅 시 BATCH_* 메타테이블 자동 생성 (1회 후 never 권장)

server:
  port: ${PORT:8080} # Railway가 PORT 환경변수를 주입함

jwt:
  secret: ${JWT_SECRET}
  access-token-expiry: 900000 # 15분 (ms)
  refresh-token-expiry: 604800000 # 7일  (ms)

app:
  cors:
    allowed-origins: ${APP_CORS_ALLOWED_ORIGINS}

logging:
  level:
    com.cashbook: INFO
    org.mybatis: WARN
    org.springframework.batch: WARN
