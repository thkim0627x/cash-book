spring:
  datasource:
    url: ${SPRING_DATASOURCE_URL}
    username: ${SPRING_DATASOURCE_USERNAME}
    password: ${SPRING_DATASOURCE_PASSWORD}
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 5
      minimum-idle: 1
      connection-timeout: 20000  # 30s→20s: 빠른 실패
      idle-timeout: 300000       # 600s→300s: 유휴 커넥션 빠르게 반환
      max-lifetime: 900000       # 1800s→900s: Supabase 타임아웃 전 교체
      keepalive-time: 60000      # 60s마다 ping — Supabase 유휴 끊김 방지
  sql:
    init:
      mode: always
      schema-locations: classpath:db/init.sql
  batch:
    job:
      enabled: false
    jdbc:
      initialize-schema: never  # Supabase에서 직접 생성 완료

server:
  port: ${PORT:8080} # Railway가 PORT 환경변수를 주입함

jwt:
  secret: ${JWT_SECRET}
  access-token-expiry: 900000 # 15분 (ms)
  refresh-token-expiry: 604800000 # 7일  (ms)

app:
  cors:
    allowed-origins: ${APP_CORS_ALLOWED_ORIGINS}

logging:
  level:
    com.cashbook: INFO
    org.mybatis: WARN
    org.springframework.batch: WARN
