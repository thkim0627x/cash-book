app:
  cors:
    allowed-origins: http://localhost:3000

spring:
  datasource:
    url: ${SUPABASE_DB_URL}
    username: postgres
    password: ${SUPABASE_DB_PASSWORD}
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 5
      minimum-idle: 2
      connection-timeout: 30000
  sql:
    init:
      mode: never   # Supabase는 SQL Editor에서 직접 실행
  batch:
    job:
      enabled: false
    jdbc:
      initialize-schema: never  # Batch 메타테이블 이미 생성됨

server:
  port: 8080

jwt:
  secret: ${JWT_SECRET:cashbook-dev-secret-key-minimum-32chars-ok!!}
  access-token-expiry: 900000
  refresh-token-expiry: 604800000

youth:
  api:
    key: ${YOUTH_API_KEY:}

logging:
  level:
    com.cashbook: DEBUG
    org.mybatis: DEBUG
