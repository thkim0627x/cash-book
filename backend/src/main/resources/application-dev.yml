app:
  cors:
    allowed-origins: http://localhost:3000

spring:
  datasource:
    url: jdbc:postgresql://localhost:5432/cashbook
    username: cashbook_user
    password: cashbook1234
    driver-class-name: org.postgresql.Driver
  sql:
    init:
      mode: always
      schema-locations: classpath:db/init.sql
      separator: ;
  devtools:
    restart:
      enabled: true
  batch:
    job:
      enabled: false          # 서버 시작 시 Job 자동 실행 방지
    jdbc:
      initialize-schema: always  # Batch 메타 테이블 자동 생성 (dev)

youth:
  api:
    key: ${YOUTH_API_KEY:}  # youth.go.kr 오픈 API 키 (미설정 시 외부 동기화 건너뜀)

server:
  port: 8080

jwt:
  secret: cashbook-dev-secret-key-minimum-32chars-ok!!
  access-token-expiry: 900000      # 15분 (ms)
  refresh-token-expiry: 604800000  # 7일  (ms)

logging:
  level:
    com.cashbook: DEBUG
    org.mybatis: DEBUG
    org.springframework.batch: INFO
